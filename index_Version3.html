<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globle Game</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f0f0f0; }
        #globeContainer { width: 100%; height: 100vh; position: relative; }
        canvas { display: block; }
        #gameInfo { position: absolute; top: 10px; left: 10px; z-index: 10; }
    </style>
</head>
<body>
    <div id="globeContainer"></div>
    <div id="gameInfo">
        <h1>Globle Game</h1>
        <p>Guess the country!</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, globe;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('globeContainer').appendChild(renderer.domElement);

            const geometry = new THREE.SphereGeometry(5, 32, 32);
            const texture = new THREE.TextureLoader().load('path/to/world-map-texture.jpg');
            const material = new THREE.MeshBasicMaterial({ map: texture });
            globe = new THREE.Mesh(geometry, material);
            scene.add(globe);

            camera.position.z = 10;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
