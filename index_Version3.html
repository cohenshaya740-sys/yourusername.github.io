<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globle-Style Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Welcome to the Globle-Style Game!</h1>
    <p>Test your geography skills in this challenging game.</p>
    <div id="gameContainer">
        <p>Guess the country!</p>
        <input type="text" id="guessInput" placeholder="Enter country name">
        <button id="submitGuess">Submit</button>
        <div id="feedback"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
